<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Break Room — Scott</title>
  <meta name="description" content="Academic brain games — Fermi estimation, cipher cracking, methodology roasting, and more. A break room for nerds.">
  <meta property="og:title" content="The Break Room — Scott">
  <meta property="og:description" content="Academic brain games — Fermi estimation, cipher cracking, methodology roasting, and more.">
  <meta property="og:type" content="website">
  <link rel="canonical" href="https://frauddyscotty.com/projects/break-room/index.html">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <a href="#main-content" class="skip-link">Skip to content</a>
  <div id="site-nav"></div>

  <!-- Menu Screen -->
  <main id="main-content">
    <div id="menu" role="region" aria-label="Game menu">
      <header class="header">
        <h1>The Break Room</h1>
        <p>Not Reddit. Better.</p>
      </header>

      <h2 class="section-title">Featured</h2>
      <div class="featured-grid" id="featured-grid" role="list" aria-label="Featured games"></div>

      <hr class="divider">

      <h2 class="section-title">All Games</h2>
      <div class="all-games-list" id="all-games-list" role="list" aria-label="All games"></div>
    </div>

    <!-- Game Screen -->
    <div id="game-screen" aria-live="polite">
      <div class="game-topbar">
        <button class="back-btn" aria-label="Back to game menu">&#8592;</button>
        <div class="game-title" aria-live="polite"></div>
      </div>
      <div class="game-container" role="region" aria-label="Game area"></div>
    </div>
  </main>

  <div id="site-footer"></div>

  <script src="main.js"></script>
  <script src="games/fermi.js"></script>
  <script src="games/fact-or-fiction.js"></script>
  <script src="games/set-matcher.js"></script>
  <script src="games/cipher.js"></script>
  <script src="games/connections.js"></script>
  <script src="games/supply-chain.js"></script>
  <script src="games/methodology-roast.js"></script>
  <script src="../../js/site-nav.js" data-base="../.."></script>
</body>
</html>
